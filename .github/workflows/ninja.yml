name: Package Ninja

on:
  workflow_dispatch:
  workflow_call:
    
jobs:
  get-versions:
    uses: ./.github/workflows/manifest.yml
    with:
      config-path: manifest.json

  package-ninja:
    needs: get-versions
    runs-on: windows-latest
    env:
      NINJA_VERSION:  ${{needs.get-versions.outputs.NINJA_VERSION}}
    steps:
      - name: Download
        run: |
          curl -L -o ninja.zip https://github.com/ninja-build/ninja/releases/download/v${{ env.NINJA_VERSION }}/ninja-win.zip
          mkdir /ninja/bin

          unzip ninja.zip
          cp ninja.exe /ninja/bin
          ls /ninja/bin
          $ENV:PATH="/ninja/bin;$ENV:PATH"
          ninja --version || true

      - name: Checkout SPDX action
        uses: actions/checkout@v4
        with:
          path: _src
          sparse-checkout: |
            .github/actions/generate-spdx
          sparse-checkout-cone-mode: false

      - name: Generate SPDX manifest
        uses: ./_src/.github/actions/generate-spdx
        with:
          package: ninja
          install-dir: /ninja

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: ninja-${{ env.NINJA_VERSION }}-win64
          path: /ninja
