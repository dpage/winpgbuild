name: Build zlib

on:
  workflow_dispatch:
  workflow_call:
    
jobs:
  get-versions:
    uses: ./.github/workflows/manifest.yml
    with:
      config-path: manifest.json

  build-zlib:
    runs-on: windows-latest
    needs: get-versions
    env:
      ZLIB_VERSION: ${{needs.get-versions.outputs.ZLIB_VERSION}}
    steps:
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Download
        run: |
          curl https://zlib.net/zlib-${{ env.ZLIB_VERSION }}.tar.gz -o ./zlib-${{ env.ZLIB_VERSION }}.tar.gz
          tar zxvf zlib-${{ env.ZLIB_VERSION }}.tar.gz

      - name: Build
        run: |
          cd zlib-${{ env.ZLIB_VERSION }}
          nmake -f win32/Makefile.msc

      - name: Install
        run: |
          cd zlib-${{ env.ZLIB_VERSION }}

          mkdir \zlib

          mkdir \zlib\bin
          copy zlib1.dll \zlib\bin\
          copy zlib1.pdb \zlib\bin\

          mkdir \zlib\include
          copy zlib.h \zlib\include\
          copy zconf.h \zlib\include\

          mkdir \zlib\lib
          copy zlib.lib \zlib\lib\
          copy zlib.pdb \zlib\lib\
          copy zdll.lib \zlib\lib\
          copy zdll.exp \zlib\lib\

      - name: Create pkgconfig File
        run: |
          mkdir \zlib\lib\pkgconfig

          >> \zlib\lib\pkgconfig\zlib.pc echo prefix=${pcfiledir}/../..
          >> \zlib\lib\pkgconfig\zlib.pc echo exec_prefix=${prefix}
          >> \zlib\lib\pkgconfig\zlib.pc echo libdir=${prefix}/lib
          >> \zlib\lib\pkgconfig\zlib.pc echo includedir=${prefix}/include
          >> \zlib\lib\pkgconfig\zlib.pc echo.
          >> \zlib\lib\pkgconfig\zlib.pc echo Name: zlib
          >> \zlib\lib\pkgconfig\zlib.pc echo Description: zlib compression library
          >> \zlib\lib\pkgconfig\zlib.pc echo Version: ${{ env.ZLIB_VERSION }}
          >> \zlib\lib\pkgconfig\zlib.pc echo Requires:
          >> \zlib\lib\pkgconfig\zlib.pc echo Libs: -L${libdir} -lzdll
          >> \zlib\lib\pkgconfig\zlib.pc echo Cflags: -I${includedir}
        shell: cmd

      - name: Generate SPDX manifest
        shell: pwsh
        run: |
          $url = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/manifest.json"
          $manifest = (Invoke-WebRequest -Uri $url -UseBasicParsing).Content | ConvertFrom-Json
          $pkg = $manifest.packages | Where-Object { $_.name -eq 'zlib' }
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $doc = [ordered]@{
            spdxVersion       = "SPDX-2.3"
            dataLicense       = "CC0-1.0"
            SPDXID            = "SPDXRef-DOCUMENT"
            name              = "zlib-$($pkg.version)"
            documentNamespace = "https://github.com/${{ github.repository }}/spdx/zlib-$($pkg.version)-${{ github.run_id }}"
            creationInfo      = [ordered]@{
              created  = $now
              creators = @("Tool: dpage/winpgbuild")
            }
            packages          = @(
              [ordered]@{
                SPDXID           = "SPDXRef-Package-zlib"
                name             = $pkg.name
                versionInfo      = $pkg.version
                downloadLocation = "NOASSERTION"
                homepage         = $pkg.source
                licenseDeclared  = $pkg.spdx_license
                licenseConcluded = $pkg.spdx_license
                filesAnalyzed    = $false
                copyrightText    = "NOASSERTION"
              }
            )
          }
          New-Item -ItemType Directory -Path /zlib/MANIFESTS -Force | Out-Null
          $doc | ConvertTo-Json -Depth 10 | Set-Content /zlib/MANIFESTS/zlib.spdx.json -Encoding UTF8

      - name: Upload Source
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: zlib-${{ env.ZLIB_VERSION }}-src
          path: zlib-${{ env.ZLIB_VERSION }}.tar.gz

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: zlib-${{ env.ZLIB_VERSION }}-win64
          path: /zlib

      - name: Package Release Assets
        shell: pwsh
        run: |
          Compress-Archive /zlib /zlib-latest.zip
          
      - name: Delete Existing Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "zlib-latest" --repo "${{ github.repository }}" --cleanup-tag --yes || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "zlib-latest"
          target_commitish: ${{ github.sha }}
          name: "zlib"
          prerelease: true
          files: |
            /zlib-latest.zip
