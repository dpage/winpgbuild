name: Build libxslt

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  get-versions:
    uses: ./.github/workflows/manifest.yml
    with:
      config-path: manifest.json

  build-libxslt:
    runs-on: windows-latest
    needs: get-versions
    env:
      LIBXML2_VERSION: ${{needs.get-versions.outputs.LIBXML2_VERSION}}
      LIBXSLT_VERSION: ${{needs.get-versions.outputs.LIBXSLT_VERSION}}
      ZLIB_VERSION: ${{needs.get-versions.outputs.ZLIB_VERSION}}

    steps:
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Download libxml2
        uses: actions/download-artifact@v7
        with:
          name: libxml2-${{ env.LIBXML2_VERSION }}-win64
          path: /build/libxml2

      - name: Download zlib
        uses: actions/download-artifact@v7
        with:
          name: zlib-${{ env.ZLIB_VERSION }}-win64
          path: /build/zlib

      - name: Download
        run: |
          curl https://gitlab.gnome.org/GNOME/libxslt/-/archive/v${{ env.LIBXSLT_VERSION }}/libxslt-v${{ env.LIBXSLT_VERSION }}.tar.gz -o ./libxslt-v${{ env.LIBXSLT_VERSION }}.tar.gz
          tar zxvf libxslt-v${{ env.LIBXSLT_VERSION }}.tar.gz

      - name: Configure
        run: |
          cd libxslt-v${{ env.LIBXSLT_VERSION }}
          cmake -B build -D CMAKE_INSTALL_PREFIX=/libxslt -D CMAKE_PREFIX_PATH="/build/zlib;/build/libxml2"

      - name: Build
        run: |
          cd libxslt-v${{ env.LIBXSLT_VERSION }}
          cmake --build build --config Release

      - name: Install
        run: |
          cd libxslt-v${{ env.LIBXSLT_VERSION }}
          cmake --install build

      - name: Checkout SPDX action
        uses: actions/checkout@v6
        with:
          path: _src
          sparse-checkout: |
            .github/actions/generate-spdx
          sparse-checkout-cone-mode: false

      - name: Generate SPDX manifest
        uses: ./_src/.github/actions/generate-spdx
        with:
          package: libxslt
          install-dir: /libxslt

      - name: Upload Source
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: libxslt-v${{ env.LIBXSLT_VERSION }}-src
          path: libxslt-v${{ env.LIBXSLT_VERSION }}.tar.gz

      - name: Upload Binaries
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: libxslt-${{ env.LIBXSLT_VERSION }}-win64
          path: /libxslt

      - name: Package Release Assets
        shell: pwsh
        run: |
          Compress-Archive /libxslt /libxslt-latest.zip
          
      - name: Delete Existing Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "libxslt-latest" --repo "${{ github.repository }}" --cleanup-tag --yes || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "libxslt-latest"
          target_commitish: ${{ github.sha }}
          name: "libxslt"
          prerelease: true
          files: |
            /libxslt-latest.zip
